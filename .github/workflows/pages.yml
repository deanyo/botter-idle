name: Deploy authoring portal to GitHub Pages

# Publishes the browser-based authoring tools (atlas viewer, biome
# editor, item editor) to GitHub Pages on every push to main. The
# tools fetch tile assets and JSON from `project/data/` and
# `project/assets/`, so we publish the whole repo as the static site
# and have a tiny landing page at root that redirects into tools/.
#
# Excludes nothing for now — the repo is small (~30 MB of tiles +
# data + scripts). If size becomes a problem later, narrow the upload
# step to `tools/` + `project/data/` + `project/assets/tiles/items/`
# + `project/assets/tiles/floor/` + ... only.

on:
  push:
    branches: [main]
  # Lets us redeploy via the Actions tab without a code change.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy if a new push lands.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage portal artifact
        run: |
          # Build a clean staging directory with what the editors need.
          # Atlas viewer + item editor reference the full dcss/ pack
          # for sprite previews; biome editor only uses the curated
          # subset under project/assets/tiles/.
          # IMPORTANT: project/data/ contains vault JSONs ported from
          # GPLv2+ DCSS source which must NOT be served. Allowlist the
          # specific files browser tools actually fetch.
          mkdir -p _site
          cp -R tools _site/tools
          mkdir -p _site/project/data
          cp project/data/items.json            _site/project/data/
          cp project/data/affixes.json          _site/project/data/
          cp project/data/enchant_combos.json   _site/project/data/
          cp project/data/biomes.json           _site/project/data/
          cp project/data/tile_atlas.json       _site/project/data/
          cp project/data/drop_tuning.json      _site/project/data/
          cp project/data/enemies.json          _site/project/data/
          cp project/data/species.json          _site/project/data/
          cp project/data/spell_archetypes.json _site/project/data/
          cp project/data/tile_dir_manifest.json _site/project/data/
          mkdir -p _site/project/assets
          cp -R project/assets/tiles _site/project/assets/tiles
          # Full DCSS tile pack (CC0). ~35 MB. Atlas viewer + item
          # editor's sprite picker fall back to `../dcss/...` paths.
          if [ -d dcss ]; then
            cp -R dcss _site/dcss
          fi
          # Root redirect into tools/.
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0; url=tools/">
          <title>Botter Authoring Portal</title>
          <link rel="canonical" href="tools/">
          <p>Redirecting to <a href="tools/">tools/</a>…</p>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
