name: Deploy authoring portal to GitHub Pages

# Publishes the browser-based authoring tools (atlas viewer, biome
# editor, item editor) to GitHub Pages on every push to main. The
# tools fetch tile assets and JSON from `project/data/` and
# `project/assets/`, so we publish the whole repo as the static site
# and have a tiny landing page at root that redirects into tools/.
#
# Excludes nothing for now — the repo is small (~30 MB of tiles +
# data + scripts). If size becomes a problem later, narrow the upload
# step to `tools/` + `project/data/` + `project/assets/tiles/items/`
# + `project/assets/tiles/floor/` + ... only.

on:
  push:
    branches: [main]
  # Lets us redeploy via the Actions tab without a code change.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy if a new push lands.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage portal artifact
        run: |
          # Build a clean staging directory containing only what the
          # browser editors need — keeps the upload small and avoids
          # exposing build scripts / Godot scene metadata.
          mkdir -p _site
          # Tools (HTML editors + manifests).
          cp -R tools _site/tools
          # Data the editors fetch (atlas, biomes, items, affixes,
          # modifiers) plus tile sprites.
          mkdir -p _site/project
          cp -R project/data _site/project/data
          mkdir -p _site/project/assets
          cp -R project/assets/tiles _site/project/assets/tiles
          # Root index.html → redirect to the tools landing page so
          # https://<user>.github.io/<repo>/ lands somewhere useful.
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0; url=tools/">
          <title>Botter Authoring Portal</title>
          <link rel="canonical" href="tools/">
          <p>Redirecting to <a href="tools/">tools/</a>…</p>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
