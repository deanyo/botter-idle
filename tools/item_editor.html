<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Botter — Item Editor</title>
<style id="slot-tab-style">
  #slot-tabs {
    display: flex; gap: 2px; align-items: center; margin-right: 8px;
  }
  .slot-tab {
    padding: 4px 10px; font-size: 12px; cursor: pointer; border: 1px solid #3a3a45;
    background: #1a1a1f; color: #888; border-radius: 3px; font-weight: 600;
  }
  .slot-tab:hover { border-color: #6cb0ff; color: #ccc; }
  .slot-tab.active { background: #2e2e38; border-color: #6cb0ff; color: #6cb0ff; }
  .slot-tab .slot-count { font-size: 10px; color: #555; margin-left: 4px; }
  .slot-tab.active .slot-count { color: #6cb0ff; }
</style>
<style>
  :root {
    --bg: #1a1a1f;
    --panel: #25252e;
    --panel-2: #2e2e38;
    --border: #3a3a45;
    --text: #e4e4e8;
    --muted: #888;
    --accent: #6cb0ff;
    --warn: #ffaa55;
    --good: #66cc88;
    --tile-bg: #0c0c10;
    --picker-bg: #1f1f26;

    --tier1: #aaaaaa;
    --tier2: #6699ff;
    --tier3: #88dd66;
    --tier4: #ffaa44;
    --tier5: #ff6655;
    --rarity-common:    #cccccc;
    --rarity-uncommon:  #6699ff;
    --rarity-rare:      #ffdd44;
    --rarity-epic:      #ff8833;
    --rarity-legendary: #ff5544;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  #topbar {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 8px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  #topbar h1 { font-size: 14px; margin: 0; color: var(--accent); font-weight: 600; }
  #topbar .spacer { flex: 1; }
  button, select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 4px 8px; border-radius: 3px; font: inherit; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  button.active { background: var(--panel-2); border-color: var(--accent); color: var(--accent); }
  input[type="text"], input[type="number"], textarea {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 4px 6px; border-radius: 3px; font: inherit;
  }
  textarea { resize: vertical; width: 100%; min-height: 60px; }
  label { color: var(--muted); font-size: 11px; }

  /* ---- Layout ---- */
  #body { display: flex; flex: 1; overflow: hidden; }

  #sidebar {
    width: 210px; flex-shrink: 0; background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-head { padding: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #sidebar-head h2 { font-size: 12px; margin: 0 0 6px; color: var(--accent); }
  #type-list { flex: 1; overflow-y: auto; padding: 4px; }
  .type-item {
    padding: 5px 8px; cursor: pointer; border-radius: 3px; font-size: 12px;
    border: 1px solid transparent;
    display: flex; align-items: center; justify-content: space-between;
  }
  .type-item:hover { background: var(--panel-2); }
  .type-item.active { background: var(--panel-2); border-color: var(--accent); color: var(--accent); }
  .type-count { font-size: 10px; color: var(--muted); }

  #main-area { flex: 1; display: flex; overflow: hidden; }

  #item-grid-col {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Tier sections */
  .tier-section { }
  .tier-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    padding: 6px 8px; background: var(--panel); border-radius: 4px;
    border-left: 3px solid var(--tier1);
  }
  .tier-header.t2 { border-color: var(--tier2); }
  .tier-header.t3 { border-color: var(--tier3); }
  .tier-header.t4 { border-color: var(--tier4); }
  .tier-header.t5 { border-color: var(--tier5); }
  .tier-header h3 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  .tier-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px;
    font-weight: 600; color: #000;
    background: var(--tier1);
  }
  .tier-badge.t2 { background: var(--tier2); }
  .tier-badge.t3 { background: var(--tier3); }
  .tier-badge.t4 { background: var(--tier4); }
  .tier-badge.t5 { background: var(--tier5); }
  .tier-note { font-size: 11px; color: var(--muted); }

  /* Item cards */
  .item-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .item-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 5px;
    padding: 8px; width: 140px; cursor: pointer; position: relative;
    transition: border-color .15s;
  }
  .item-card:hover { border-color: var(--accent); }
  .item-card.selected { border-color: var(--accent); background: var(--panel-2); }
  .item-card.dirty::after {
    content: "●"; position: absolute; top: 4px; right: 6px;
    color: var(--warn); font-size: 10px;
  }
  .item-card .sprite-wrap {
    width: 64px; height: 64px; background: var(--tile-bg);
    border: 1px solid var(--border); border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 6px;
  }
  .item-card img { width: 64px; height: 64px; image-rendering: pixelated; }
  .item-card .card-name {
    font-size: 11px; font-weight: 600; text-align: center;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-bottom: 4px;
  }
  .item-card .card-meta {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
  }
  .rarity-pill {
    font-size: 9px; padding: 1px 5px; border-radius: 8px; font-weight: 600;
    color: #000;
  }
  .rarity-common    { background: var(--rarity-common);    color: #333; }
  .rarity-uncommon  { background: var(--rarity-uncommon);  }
  .rarity-rare      { background: var(--rarity-rare);      color: #222; }
  .rarity-epic      { background: var(--rarity-epic);      }
  .rarity-legendary { background: var(--rarity-legendary); }
  .unique-badge {
    font-size: 9px; padding: 1px 4px; border-radius: 2px;
    background: #553300; color: #ffdd88; border: 1px solid #886622;
  }
  .card-stats { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 4px; }
  .card-stats span { color: var(--text); }
  .drop-bar {
    display: flex; height: 4px; border-radius: 2px; overflow: hidden; gap: 1px;
    margin-top: 4px;
  }
  .drop-bar-seg { flex: 1; height: 100%; border-radius: 1px; }
  .tag-strip { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 4px; }
  .flavor-tag {
    font-size: 8px; padding: 0 4px; border-radius: 6px; border: 1px solid;
    white-space: nowrap;
  }

  /* Edit panel */
  #edit-panel {
    width: 340px; flex-shrink: 0; background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #edit-panel.hidden { display: none; }
  #edit-head {
    padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
  }
  #edit-head h2 { margin: 0; font-size: 13px; flex: 1; }
  #edit-body { flex: 1; overflow-y: auto; padding: 12px; }

  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block; margin-bottom: 4px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em;
  }
  .field-group input[type="text"] { width: 100%; }
  .field-group input[type="number"] { width: 70px; }
  .field-group textarea { font-size: 12px; }
  .field-row { display: flex; gap: 8px; align-items: center; }
  .field-row label { min-width: auto; margin-bottom: 0; }

  /* Tier buttons in edit panel */
  .tier-btn-row { display: flex; gap: 4px; }
  .tier-btn {
    flex: 1; padding: 4px 2px; font-size: 11px; font-weight: 600; text-align: center;
    border-radius: 3px; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg); color: var(--muted);
  }
  .tier-btn.active { color: #000; border-color: transparent; }
  .tier-btn.t1.active { background: var(--tier1); }
  .tier-btn.t2.active { background: var(--tier2); }
  .tier-btn.t3.active { background: var(--tier3); }
  .tier-btn.t4.active { background: var(--tier4); }
  .tier-btn.t5.active { background: var(--tier5); }

  /* Drop weight sliders */
  .drop-weight-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .drop-weight-row label { width: 28px; text-align: right; color: var(--muted); font-size: 11px; margin-bottom: 0; }
  .drop-weight-row .dw-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .drop-weight-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .drop-weight-row .dw-val { width: 28px; font-size: 11px; text-align: right; }

  /* Flavor tag grid */
  .tag-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-toggle {
    padding: 2px 8px; border-radius: 10px; font-size: 10px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); color: var(--muted);
  }
  .tag-toggle.on { color: #000; font-weight: 600; }

  /* Sprite preview in edit */
  #edit-sprite-wrap {
    width: 80px; height: 80px; background: var(--tile-bg); border: 1px solid var(--border);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #edit-sprite-wrap img { width: 80px; height: 80px; image-rendering: pixelated; }
  .edit-sprite-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 14px; }
  .edit-sprite-row .right { flex: 1; }

  /* Picker modal */
  #picker { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: none; align-items: center; justify-content: center; z-index: 100; }
  #picker.open { display: flex; }
  #picker-inner { background: var(--picker-bg); border: 1px solid var(--accent); border-radius: 6px; width: 90%; max-width: 1100px; max-height: 85vh; display: flex; flex-direction: column; }
  #picker-head { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  #picker-head input { flex: 1; }
  #picker-filter { display: flex; gap: 4px; }
  #picker-grid { flex: 1; overflow-y: auto; padding: 8px; display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 4px; }
  .pick-cell { background: var(--tile-bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px; text-align: center; cursor: pointer; }
  .pick-cell:hover { border-color: var(--accent); }
  .pick-cell img { width: 100%; aspect-ratio: 1; object-fit: contain; image-rendering: pixelated; background: #000; }
  .pick-cell .pick-name { font-size: 8px; color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

  #status { padding: 8px 14px; font-size: 11px; color: var(--good); }
  #status.warn { color: var(--warn); }
</style>
</head>
<body>

<div id="topbar">
  <h1 id="topbar-title">Item Editor</h1>
  <div id="slot-tabs"></div>
  <div id="status"></div>
  <div class="spacer"></div>
  <button onclick="addItem()">+ New item</button>
  <button class="primary" onclick="exportJSON()">⬇ Export items.json slice</button>
</div>

<div id="body">
  <aside id="sidebar">
    <div id="sidebar-head">
      <h2>Base Type</h2>
      <input type="text" id="search" placeholder="Search items…" oninput="applyFilters()" style="width:100%;font-size:12px;">
    </div>
    <div id="type-list"></div>
  </aside>

  <div id="main-area">
    <div id="item-grid-col"></div>
    <div id="edit-panel" class="hidden">
      <div id="edit-head">
        <h2 id="edit-title">Edit Item</h2>
        <button onclick="deleteItem()" style="color:#ff8888;font-size:11px;">Delete</button>
        <button onclick="closeEdit()">✕</button>
      </div>
      <div id="edit-body"></div>
    </div>
  </div>
</div>

<!-- Picker modal -->
<div id="picker">
  <div id="picker-inner">
    <div id="picker-head">
      <strong>Pick Sprite</strong>
      <div id="picker-filter">
        <!-- Rebuilt by renderPickerFilterBar() per active slot -->
      </div>
      <input type="text" id="picker-search" placeholder="filter…" oninput="renderPicker()">
      <button onclick="closePicker()">Close</button>
    </div>
    <div id="picker-grid"></div>
  </div>
</div>

<script>
const ATLAS_PATH    = "../project/data/tile_atlas.json";
const TILE_BASE     = "../dcss/Dungeon Crawl Stone Soup Full/";
const TILE_BASE_SUP = "../dcss/Dungeon Crawl Stone Soup Supplemental/";

// Per-slot config: manifest path + picker root + export name + label.
// picker_roots controls which atlas paths the sprite picker offers when
// the user clicks "Browse sprites…". Listed in display order in the tab strip.
const SLOTS = [
  { id:'weapon', label:'1H Swords',
    manifest:'items_manifest.json',
    export_key:'items_1h_swords', export_file:'items_1h_swords.json',
    picker_roots:['item/weapon/'],
    picker_extras:[
      { key:'sword', label:'Swords',
        keywords:['dagger','knife','short_sword','falchion','long_sword','scimitar','rapier','katana','sabre','quickblade','ancient_sword','demon_blade','elven','orcish','cutlass'] },
      { key:'artefact', label:'Artefacts', path_includes:'/artefact/' }
    ] },
  { id:'helm', label:'Helms',
    manifest:'items_helms_manifest.json',
    export_key:'items_helms', export_file:'items_helms.json',
    picker_roots:['item/armor/headgear/','item/armor/artefact/'],
    picker_extras:[
      { key:'hat', label:'Hats/Caps', keywords:['hat','cap','hood','cornuthaum','jester'] },
      { key:'helmet', label:'Helmets', keywords:['helmet','helm','crown'] },
      { key:'artefact', label:'Artefacts', path_includes:'/artefact/' }
    ] },
  { id:'armor', label:'Armor',
    manifest:'items_armor_manifest.json',
    export_key:'items_armor', export_file:'items_armor.json',
    picker_roots:['item/armor/torso/','item/armor/artefact/'],
    picker_extras:[
      { key:'cloth', label:'Cloth/Leather', keywords:['robe','leather','animal_skin'] },
      { key:'mail', label:'Mail', keywords:['chain','ring_mail','scale','splint','banded'] },
      { key:'plate', label:'Plate/Crystal', keywords:['plate','crystal'] },
      { key:'dragon', label:'Dragon', keywords:['dragon'] },
      { key:'artefact', label:'Artefacts', path_includes:'/artefact/' }
    ] },
  { id:'shield', label:'Shields',
    manifest:'items_shields_manifest.json',
    export_key:'items_shields', export_file:'items_shields.json',
    picker_roots:['item/armor/shields/','item/armor/artefact/'],
    picker_extras:[
      { key:'buckler', label:'Bucklers', keywords:['buckler'] },
      { key:'shield', label:'Shields', keywords:['shield','lshield'] },
      { key:'artefact', label:'Artefacts', path_includes:'/artefact/' }
    ] },
  { id:'boots', label:'Boots',
    manifest:'items_boots_manifest.json',
    export_key:'items_boots', export_file:'items_boots.json',
    picker_roots:['item/armor/feet/','item/armor/artefact/'],
    picker_extras:[
      { key:'boots', label:'Boots', keywords:['boot','low_boot'] },
      { key:'artefact', label:'Artefacts', path_includes:'/artefact/' }
    ] },
  { id:'ring', label:'Rings',
    manifest:'items_rings_manifest.json',
    export_key:'items_rings', export_file:'items_rings.json',
    picker_roots:['item/ring/'],
    picker_extras:[
      { key:'ring', label:'Rings', keywords:['ring_','agate','brass','bronze','clay','copper','coral','diamond','emerald','glass','gold','granite','iron','jade','moonstone','opal','pearl','plain','ruby','silver','steel','tiger_eye','tourmaline','wooden'] },
      { key:'artefact', label:'Artefacts', path_includes:'/artefact/' }
    ] },
  { id:'amulet', label:'Amulets',
    manifest:'items_amulets_manifest.json',
    export_key:'items_amulets', export_file:'items_amulets.json',
    picker_roots:['item/amulet/'],
    picker_extras:[
      { key:'amulet', label:'Amulets', keywords:['amulet','bone','cameo','celtic','crystal','cylinder','eye','face','penta','ring_','stone'] },
      { key:'artefact', label:'Artefacts', path_includes:'/artefact/' }
    ] },
];

const TIER_COLORS = ['','#aaaaaa','#6699ff','#88dd66','#ffaa44','#ff6655'];
const TIER_LABELS = ['','Tier 1 — Dungeon','Tier 2 — Surface','Tier 3 — Wilds','Tier 4 — Vaults','Tier 5 — Planes'];
const TIER_NOTES  = ['',
  'Drops in T1 (Dungeon/Mines). Common to uncommon.',
  'Drops mainly in T1–T2. Uncommon to rare.',
  'Drops mainly in T2–T3. Rare.',
  'Drops mainly in T3–T4. Epic.',
  'Drops only in T4–T5. Epic to legendary. Uniques live here.'
];
const RARITIES    = ['common','uncommon','rare','epic','legendary'];
const RARITY_COLORS = {common:'#cccccc',uncommon:'#6699ff',rare:'#ffdd44',epic:'#ff8833',legendary:'#ff5544'};

let activeSlot = SLOTS[0];
let manifest  = {};
let atlas     = {};
let items     = [];   // working copy for the active slot
let dirty     = new Set();
let activeType = '__all__';
let selectedId = null;
let pickerCallback = null;
let pickerCategory = 'all';
// Per-slot working copies — switching tabs preserves your edits in memory
// (they only persist to disk via Export).
const slotState = {}; // id -> {manifest, items, dirty}

// ---------- Boot ----------
async function init() {
  setStatus('Loading…');
  try {
    atlas = await fetch(ATLAS_PATH).then(r=>r.json());
    renderSlotTabs();
    await loadSlot(SLOTS[0]);
    setStatus('');
  } catch(e) {
    setStatus('Load error: '+e.message, true);
  }
}

function renderSlotTabs() {
  const div = document.getElementById('slot-tabs');
  div.innerHTML = '';
  SLOTS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'slot-tab' + (s.id===activeSlot.id ? ' active' : '');
    el.dataset.slot = s.id;
    el.innerHTML = `${s.label}<span class="slot-count" id="slot-count-${s.id}"></span>`;
    el.onclick = () => loadSlot(s);
    div.appendChild(el);
  });
}

function updateSlotCount(slotId, n) {
  const el = document.getElementById('slot-count-'+slotId);
  if (el) el.textContent = n != null ? '('+n+')' : '';
}

async function loadSlot(slot) {
  // Persist current state in memory before switching
  if (activeSlot && manifest && manifest.items) {
    slotState[activeSlot.id] = { manifest, items, dirty: new Set(dirty) };
  }
  activeSlot = slot;
  selectedId = null;
  activeType = '__all__';
  document.getElementById('topbar-title').textContent = 'Item Editor — ' + slot.label;
  // Refresh active highlight on tabs
  document.querySelectorAll('.slot-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.slot === slot.id));
  // Reuse cached state if we've already loaded this slot
  const cached = slotState[slot.id];
  if (cached) {
    manifest = cached.manifest;
    items = cached.items;
    dirty = cached.dirty;
  } else {
    try {
      manifest = await fetch(slot.manifest).then(r=>{
        if (!r.ok) throw new Error('HTTP '+r.status+' for '+slot.manifest);
        return r.json();
      });
      items = JSON.parse(JSON.stringify(manifest.items));
      dirty = new Set();
    } catch(e) {
      setStatus('Failed to load '+slot.manifest+': '+e.message, true);
      return;
    }
  }
  // Reset picker state for this slot
  allWeaponTiles = [];
  pickerCategory = 'all';
  closeEdit();
  renderSidebar();
  renderGrid();
  updateSlotCount(slot.id, items.length);
}

function setStatus(msg, warn=false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = warn ? 'warn' : '';
}

// ---------- Sidebar ----------
function renderSidebar() {
  const div = document.getElementById('type-list');
  const counts = {};
  items.forEach(it => { counts[it.base_type] = (counts[it.base_type]||0)+1; });
  const types = ['__all__', ...Object.keys(manifest.base_types||{})];
  div.innerHTML = '';
  types.forEach(t => {
    const el = document.createElement('div');
    el.className = 'type-item' + (t===activeType ? ' active' : '');
    const label = t==='__all__' ? 'All' : (manifest.base_types[t]?.label || t);
    const count = t==='__all__' ? items.length : (counts[t]||0);
    el.innerHTML = `<span>${label}</span><span class="type-count">${count}</span>`;
    el.onclick = () => { activeType=t; renderSidebar(); renderGrid(); };
    div.appendChild(el);
  });
}

// ---------- Main grid ----------
function applyFilters() { renderGrid(); }

function filteredItems() {
  const q = document.getElementById('search').value.toLowerCase();
  return items.filter(it => {
    if (activeType !== '__all__' && it.base_type !== activeType) return false;
    if (q && !it.name.toLowerCase().includes(q) && !it.id.includes(q)) return false;
    return true;
  });
}

function renderGrid() {
  const col = document.getElementById('item-grid-col');
  const visible = filteredItems();

  // Group by item_tier
  const byTier = {1:[],2:[],3:[],4:[],5:[]};
  visible.forEach(it => (byTier[it.item_tier]||byTier[5]).push(it));

  col.innerHTML = '';
  for (let t=1; t<=5; t++) {
    if (!byTier[t].length) continue;
    const sec = document.createElement('div');
    sec.className = 'tier-section';
    sec.innerHTML = `
      <div class="tier-header t${t}">
        <span class="tier-badge t${t}">T${t}</span>
        <h3>${TIER_LABELS[t]}</h3>
        <span class="tier-note">${TIER_NOTES[t]}</span>
      </div>
      <div class="item-grid" id="grid-t${t}"></div>
    `;
    col.appendChild(sec);
    const grid = sec.querySelector('.item-grid');
    byTier[t].forEach(it => grid.appendChild(makeCard(it)));
  }
}

function makeCard(it) {
  const card = document.createElement('div');
  card.className = 'item-card' + (it.id===selectedId?' selected':'') + (dirty.has(it.id)?' dirty':'');
  card.dataset.id = it.id;

  const dw = it.drop_weights || [0,0,0,0,0];
  const maxW = Math.max(...dw, 1);
  const segs = dw.map((w,i) => {
    const pct = Math.round(w/maxW*100);
    const alpha = pct > 0 ? 0.3 + pct/100*0.7 : 0.05;
    return `<div class="drop-bar-seg" style="background:${TIER_COLORS[i+1]};opacity:${alpha}" title="T${i+1}: ${w}"></div>`;
  }).join('');

  const tags = (it.flavor_tags||[]).map(tag => {
    const info = manifest.flavor_tags?.[tag] || {};
    return `<span class="flavor-tag" style="color:${info.color||'#aaa'};border-color:${info.color||'#555'}">${tag}</span>`;
  }).join('');

  const rarityColor = RARITY_COLORS[it.rarity]||'#ccc';
  const textColor = ['common','uncommon','rare'].includes(it.rarity) ? '#000' : '#fff';

  card.innerHTML = `
    <div class="sprite-wrap"><img src="${tileUrl(it.tile)}" onerror="this.src='';this.style.display='none'"></div>
    <div class="card-name">${it.name}</div>
    <div class="card-meta">
      <span class="rarity-pill rarity-${it.rarity}" style="background:${rarityColor};color:${textColor}">${it.rarity}</span>
      ${it.unique ? '<span class="unique-badge">unique</span>' : ''}
    </div>
    <div class="card-stats">ATK <span>${it.atk}</span>${it.hp?' HP <span>+'+it.hp+'</span>':''}</div>
    <div class="drop-bar" title="Drop weight per dungeon tier">${segs}</div>
    <div class="tag-strip">${tags}</div>
  `;
  card.onclick = () => openEdit(it.id);
  return card;
}

function tileUrl(path) {
  return TILE_BASE + path;
}

// ---------- Edit panel ----------
function openEdit(id) {
  selectedId = id;
  renderGrid(); // refresh selection highlight
  const it = items.find(x=>x.id===id);
  if (!it) return;

  document.getElementById('edit-panel').classList.remove('hidden');
  document.getElementById('edit-title').textContent = it.name;
  renderEditBody(it);
}

function closeEdit() {
  selectedId = null;
  document.getElementById('edit-panel').classList.add('hidden');
  renderGrid();
}

function renderEditBody(it) {
  const body = document.getElementById('edit-body');
  const flavorKeys = Object.keys(manifest.flavor_tags||{});
  const tierBtns = [1,2,3,4,5].map(t =>
    `<button class="tier-btn t${t}${it.item_tier===t?' active':''}" onclick="setField('${it.id}','item_tier',${t});renderEditBody(items.find(x=>x.id==='${it.id}'))">T${t}</button>`
  ).join('');
  const rarityOpts = RARITIES.map(r =>
    `<option value="${r}"${it.rarity===r?' selected':''}>${r}</option>`
  ).join('');
  const baseTypeOpts = Object.keys(manifest.base_types||{}).map(t =>
    `<option value="${t}"${it.base_type===t?' selected':''}>${manifest.base_types[t].label}</option>`
  ).join('');

  const dwRows = [1,2,3,4,5].map(t => {
    const w = it.drop_weights[t-1]||0;
    return `<div class="drop-weight-row">
      <span class="dw-dot" style="background:${TIER_COLORS[t]}"></span>
      <label>T${t}</label>
      <input type="range" min="0" max="100" value="${w}" oninput="setDW('${it.id}',${t-1},this.value);this.nextElementSibling.textContent=this.value">
      <span class="dw-val">${w}</span>
    </div>`;
  }).join('');

  const tagGrid = flavorKeys.map(tag => {
    const on = (it.flavor_tags||[]).includes(tag);
    const info = manifest.flavor_tags[tag];
    return `<button class="tag-toggle${on?' on':''}" style="${on?'background:'+info.color+';color:#000;border-color:'+info.color:''}"
      onclick="toggleTag('${it.id}','${tag}')" title="${info.desc}">${tag}</button>`;
  }).join('');

  body.innerHTML = `
    <div class="edit-sprite-row">
      <div id="edit-sprite-wrap"><img id="edit-sprite-img" src="${tileUrl(it.tile)}" onerror="this.src='';this.style.display='none'"></div>
      <div class="right">
        <div class="field-group">
          <label>Tile path</label>
          <input type="text" style="width:100%;font-size:11px" value="${it.tile}" id="tile-path-input"
            onchange="setField('${it.id}','tile',this.value);document.getElementById('edit-sprite-img').src=tileUrl(this.value)">
        </div>
        <button onclick="openPicker('${it.id}')">Browse sprites…</button>
      </div>
    </div>

    <div class="field-group">
      <label>Name</label>
      <input type="text" value="${it.name}" onchange="setField('${it.id}','name',this.value);document.getElementById('edit-title').textContent=this.value;renderGrid()">
    </div>

    <div class="field-group">
      <label>ID (readonly)</label>
      <input type="text" value="${it.id}" style="color:var(--muted);font-size:11px" readonly>
    </div>

    <div class="field-group">
      <label>Base type</label>
      <select onchange="setField('${it.id}','base_type',this.value)">${baseTypeOpts}</select>
    </div>

    <div class="field-group">
      <label>Item tier (where it lives in the progression)</label>
      <div class="tier-btn-row">${tierBtns}</div>
    </div>

    <div class="field-group">
      <label>Rarity (affix count: common=0, uncommon=1, rare=2, epic=3, legendary=4)</label>
      <select onchange="setField('${it.id}','rarity',this.value)">${rarityOpts}</select>
      &nbsp;<label><input type="checkbox"${it.unique?' checked':''} onchange="setField('${it.id}','unique',this.checked)"> Unique (one per run)</label>
    </div>

    <div class="field-group">
      <label>Stats</label>
      <div class="field-row">
        <span style="font-size:11px;color:var(--muted)">ATK</span>
        <input type="number" value="${it.atk}" min="0" max="999" onchange="setField('${it.id}','atk',+this.value)">
        <span style="font-size:11px;color:var(--muted)">HP</span>
        <input type="number" value="${it.hp||0}" min="0" max="999" onchange="setField('${it.id}','hp',+this.value)">
        <span style="font-size:11px;color:var(--muted)">DEF</span>
        <input type="number" value="${it.def||0}" min="0" max="999" onchange="setField('${it.id}','def',+this.value)">
      </div>
    </div>

    <div class="field-group">
      <label>Flavor tags (hold future mechanic intent)</label>
      <div class="tag-grid">${tagGrid}</div>
    </div>

    <div class="field-group">
      <label>Drop weights per dungeon tier (higher = more likely to appear)</label>
      ${dwRows}
      <div style="font-size:10px;color:var(--muted);margin-top:4px">
        Bar on card shows relative weight (not %). 0 = never drops in that tier.
      </div>
    </div>

    <div class="field-group">
      <label>Lore</label>
      <textarea onchange="setField('${it.id}','lore',this.value)">${it.lore||''}</textarea>
    </div>

    ${it.unique ? `<div class="field-group">
      <label>Future mechanic (documentation only, not wired)</label>
      <textarea onchange="setField('${it.id}','future_mechanic',this.value)">${it.future_mechanic||''}</textarea>
    </div>` : ''}

    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      <button class="primary" onclick="applyEdit()">Apply</button>
      <span style="font-size:11px;color:var(--muted);margin-left:8px">Changes mark item as dirty (●) until exported.</span>
    </div>
  `;
}

function applyEdit() {
  setStatus('Changes staged — use Export to write items.json.');
  setTimeout(() => setStatus(''), 2000);
}

// ---------- Field mutations ----------
function setField(id, key, val) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  it[key] = val;
  dirty.add(id);
  updateCard(id);
}
function setDW(id, idx, val) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  it.drop_weights[idx] = +val;
  dirty.add(id);
  updateCard(id);
}
function toggleTag(id, tag) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  if (!it.flavor_tags) it.flavor_tags=[];
  const i = it.flavor_tags.indexOf(tag);
  if (i>=0) it.flavor_tags.splice(i,1); else it.flavor_tags.push(tag);
  dirty.add(id);
  updateCard(id);
  renderEditBody(it);
}
function updateCard(id) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  const oldCard = document.querySelector(`.item-card[data-id="${id}"]`);
  if (oldCard) {
    const newCard = makeCard(it);
    oldCard.replaceWith(newCard);
  }
}

function addItem() {
  const id = 'new_'+activeSlot.id+'_' + Date.now();
  // Pull a sensible default from the manifest's first item so per-slot
  // defaults (sprite, base_type, atk/def/hp shape) come along for the ride.
  const tplSrc = items[0] || {};
  const tpl = {
    id,
    name: 'New ' + activeSlot.label.replace(/s$/,''),
    slot: activeSlot.id,
    base_type: tplSrc.base_type || Object.keys(manifest.base_types || {})[0] || '',
    item_tier: 3,
    rarity: 'rare',
    tile: tplSrc.tile || '',
    atk: 0, def: 0, hp: 0,
    flavor_tags: [], lore: '',
    drop_weights: [0, 0, 100, 0, 0],
    unique: false
  };
  items.push(tpl);
  dirty.add(id);
  updateSlotCount(activeSlot.id, items.length);
  renderSidebar();
  renderGrid();
  openEdit(id);
}

function deleteItem() {
  if (!selectedId) return;
  if (!confirm('Delete '+selectedId+'?')) return;
  items = items.filter(x=>x.id!==selectedId);
  dirty.delete(selectedId);
  selectedId = null;
  closeEdit();
  renderSidebar();
  renderGrid();
  updateSlotCount(activeSlot.id, items.length);
}

// ---------- Sprite picker ----------
let pickerItemId = null;
let allWeaponTiles = [];

function buildWeaponTileList() {
  // Pull all atlas paths under any of the active slot's picker_roots.
  const roots = activeSlot.picker_roots || [];
  allWeaponTiles = Object.keys(atlas)
    .filter(k => roots.some(r => k.startsWith(r)))
    .sort();
}

function renderPickerFilterBar() {
  const bar = document.getElementById('picker-filter');
  bar.innerHTML = '';
  const buttons = [{ key:'all', label:'All '+activeSlot.label }, ...(activeSlot.picker_extras || [])];
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    btn.onclick = () => setPickerCategory(b.key, btn);
    if (b.key === pickerCategory) btn.classList.add('active');
    bar.appendChild(btn);
  });
}

function setPickerCategory(cat, btn) {
  pickerCategory = cat;
  document.querySelectorAll('#picker-filter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPicker();
}

function openPicker(id) {
  pickerItemId = id;
  if (!allWeaponTiles.length) buildWeaponTileList();
  pickerCategory = 'all';
  renderPickerFilterBar();
  document.getElementById('picker').classList.add('open');
  document.getElementById('picker-search').value = '';
  renderPicker();
}
function closePicker() { document.getElementById('picker').classList.remove('open'); }

function renderPicker() {
  const q = document.getElementById('picker-search').value.toLowerCase();
  const grid = document.getElementById('picker-grid');
  grid.innerHTML = '';

  let tiles = allWeaponTiles;
  if (pickerCategory !== 'all') {
    const cfg = (activeSlot.picker_extras || []).find(e => e.key === pickerCategory);
    if (cfg) {
      if (cfg.path_includes) tiles = tiles.filter(k => k.includes(cfg.path_includes));
      else if (cfg.keywords) tiles = tiles.filter(k => cfg.keywords.some(kw => k.includes(kw)));
    }
  }
  if (q) tiles = tiles.filter(k => k.includes(q));

  tiles.slice(0,300).forEach(path => {
    const cell = document.createElement('div');
    cell.className = 'pick-cell';
    const shortName = path.split('/').pop().replace('.png','');
    cell.innerHTML = `
      <img src="${tileUrl(path)}" onerror="this.parentElement.style.opacity='.3'">
      <div class="pick-name">${shortName}</div>
    `;
    cell.onclick = () => {
      const it = items.find(x=>x.id===pickerItemId);
      if (it) {
        setField(pickerItemId, 'tile', path);
        document.getElementById('tile-path-input').value = path;
        document.getElementById('edit-sprite-img').src = tileUrl(path);
      }
      closePicker();
    };
    grid.appendChild(cell);
  });
  if (!grid.children.length) grid.innerHTML = '<div style="color:var(--muted);padding:16px">No tiles match</div>';
}

// ---------- Export ----------
function exportJSON() {
  // Build items.json-compatible slice for the active slot.
  const slot = activeSlot;
  const out = {
    "_note": "Auto-generated by item_editor.html. Merge into project/data/items.json (the items[] array).",
    "_generated": new Date().toISOString(),
    "_slot": slot.id,
    [slot.export_key]: items.map(it => ({
      id: it.id,
      name: it.name,
      slot: it.slot || slot.id,
      base_type: it.base_type,
      item_tier: it.item_tier,
      rarity: it.rarity,
      tile: it.tile,
      atk: it.atk || 0,
      def: it.def || 0,
      hp: it.hp || 0,
      flavor_tags: it.flavor_tags || [],
      lore: it.lore || '',
      drop_weights: it.drop_weights || [0,0,0,0,0],
      unique: it.unique || false,
      ...(it.future_mechanic ? {future_mechanic: it.future_mechanic} : {})
    }))
  };

  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slot.export_file;
  a.click();
  dirty.clear();
  setStatus('Exported '+slot.export_file+' — drop into project/data/ or merge into items.json.');
  setTimeout(() => setStatus(''), 4000);
  renderSidebar();
  renderGrid();
}

// ---------- Drop weight visualiser legend ----------
function renderDropLegend() {
  // Shown in topbar
  const legend = TIER_COLORS.slice(1).map((c,i) =>
    `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--muted)">
      <span style="width:10px;height:10px;border-radius:50%;background:${c};display:inline-block"></span>T${i+1}
    </span>`
  ).join(' ');
  const el = document.createElement('div');
  el.style = 'display:flex;gap:6px;align-items:center;font-size:11px;color:var(--muted)';
  el.innerHTML = 'Drop bar: ' + legend;
  document.getElementById('topbar').insertBefore(el, document.getElementById('topbar').querySelector('.spacer'));
}

init().then(renderDropLegend);
</script>
